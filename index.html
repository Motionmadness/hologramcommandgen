<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DecentHolograms - Step-by-Step Creator</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 600px; background: #222; padding: 20px; border-radius: 10px; border: 1px solid #444; }
        h1 { color: #55ff55; text-align: center; margin-top: 0; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; background: #333; padding: 10px; border-radius: 5px; }
        input[type="text"] { flex-grow: 1; background: #111; border: 1px solid #555; color: white; padding: 8px; border-radius: 4px; }
        input[type="color"] { background: none; border: none; width: 40px; height: 35px; cursor: pointer; }
        .btn { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; padding: 10px; }
        .btn-add { background: #55ff55; color: black; width: 100%; margin-bottom: 20px; }
        .btn-delete { background: #ff5555; color: white; }
        .step-box { background: #000; border-left: 4px solid #55ff55; padding: 15px; margin-top: 20px; }
        .step { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .step-label { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .cmd-display { font-family: monospace; color: #aaa; word-break: break-all; display: block; margin-bottom: 8px; font-size: 0.9rem; }
        .copy-btn { background: #5555ff; color: white; width: 100%; }
        .copy-btn:active { background: #ffffff; color: black; }
        .danger-zone { margin-top: 30px; border-top: 1px solid #444; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>DH Easy Creator</h1>
    
    <label>Hologram Name:</label><br>
    <input type="text" id="holoName" value="MyHologram" style="margin-bottom: 15px; width: 150px;"><br>

    <div id="lineInputs"></div>
    <button class="btn btn-add" onclick="addLine()">+ Add Line</button>

    <div class="step-box" id="stepBox">
        <h3 style="margin-top:0">Follow these steps:</h3>
        <div id="stepsList"></div>
    </div>

    <div class="danger-zone">
        <label>Made a mistake? Use this to delete it and restart:</label>
        <div class="step">
            <code class="cmd-display" id="delCmd">/dh h delete MyHologram</code>
            <button class="btn btn-delete" style="width:100%" onclick="copyText('delCmd')">Copy Delete Command</button>
        </div>
    </div>
</div>

<script>
    let lines = [
        { text: "Welcome to the Server!", color: "#55ff55" },
        { text: "ima eat u twin hehe", color: "#ff5555" },
        { text: "- chad", color: "#5555ff" }
    ];

    function addLine() {
        lines.push({ text: "New Text...", color: "#ffffff" });
        render();
    }

    function removeLine(i) {
        lines.splice(i, 1);
        render();
    }

    function update(i, field, val) {
        lines[i][field] = val;
        renderSteps();
    }

    function render() {
        const container = document.getElementById('lineInputs');
        container.innerHTML = '';
        lines.forEach((line, i) => {
            const div = document.createElement('div');
            div.className = 'input-row';
            div.innerHTML = `
                <input type="color" value="${line.color}" oninput="update(${i}, 'color', this.value)">
                <input type="text" value="${line.text}" oninput="update(${i}, 'text', this.value)">
                <button class="btn btn-delete" onclick="removeLine(${i})">X</button>
            `;
            container.appendChild(div);
        });
        renderSteps();
    }

    function renderSteps() {
        const list = document.getElementById('stepsList');
        const name = document.getElementById('holoName').value.trim();
        document.getElementById('delCmd').innerText = `/dh h delete ${name}`;
        list.innerHTML = '';

        lines.forEach((line, i) => {
            const hex = line.color.toUpperCase();
            const colorCode = `&#${hex.substring(1)}`;
            const cmd = i === 0 
                ? `/dh h create ${name} ${colorCode}${line.text}`
                : `/dh l add ${name} ${colorCode}${line.text}`;
            
            const stepDiv = document.createElement('div');
            stepDiv.className = 'step';
            stepDiv.innerHTML = `
                <span class="step-label">Step ${i + 1}: ${i === 0 ? 'Create Hologram' : 'Add Next Line'}</span>
                <code class="cmd-display" id="cmd-${i}">${cmd}</code>
                <button class="btn copy-btn" onclick="copyText('cmd-${i}')">Copy Step ${i+1}</button>
            `;
            list.appendChild(stepDiv);
        });
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        
        // Visual feedback
        const btn = document.querySelector(`button[onclick="copyText('${id}')"]`);
        const originalText = btn.innerText;
        btn.innerText = "COPIED! Now paste in Minecraft";
        setTimeout(() => { btn.innerText = originalText; }, 2000);
    }

    document.getElementById('holoName').oninput = renderSteps;
    render();
</script>

</body>
</html>
