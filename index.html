<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced DecentHolograms Generator</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --panel: #2d2d2d;
            --input: #3d3d3d;
            --text: #e0e0e0;
            --accent: #55ff55;
            --danger: #ff5555;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 { color: var(--accent); margin-top: 0; text-align: center; }

        .settings-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #444;
        }

        .input-field {
            background: var(--input);
            border: 1px solid #555;
            color: white;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }

        /* Line Row Styles */
        .line-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 5px;
        }

        .line-text { flex-grow: 1; }

        .format-btn {
            background: var(--input);
            border: 1px solid #666;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }

        .format-btn.active {
            background: var(--accent);
            color: black;
        }

        /* Preview Area */
        .preview-container {
            background: #000;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            border: 2px solid #444;
            text-align: center;
            min-height: 50px;
            line-height: 1.5;
        }

        .preview-line {
            font-family: 'Courier New', Courier, monospace;
            font-weight: normal;
            font-size: 18px;
            text-shadow: 2px 2px 0px #222;
        }

        /* Commands Area */
        .commands-container {
            background: #111;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid var(--accent);
        }

        .command-item {
            font-family: 'Consolas', monospace;
            color: #d1d1d1;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            background: rgba(255,255,255,0.05);
        }

        .copy-small {
            font-size: 11px;
            background: #444;
            border: none;
            color: white;
            padding: 3px 8px;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn-main {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-add { background: #55ccff; margin-bottom: 10px; }
        .btn-delete { background: var(--danger); }

    </style>
</head>
<body>

<div class="container">
    <h1>DH Command Generator</h1>

    <div class="settings-row">
        <div style="flex-grow:1">
            <label>Hologram ID (No Spaces)</label><br>
            <input type="text" id="holoName" class="input-field" value="MyHologram" style="width: 100%;">
        </div>
    </div>

    <div id="linesList">
        <!-- Lines added here -->
    </div>

    <button class="btn-main btn-add" onclick="addLine()">+ Add New Line</button>

    <h3>Preview</h3>
    <div class="preview-container" id="previewArea"></div>

    <h3>Commands</h3>
    <div class="commands-container" id="commandArea">
        <!-- Commands will appear here -->
    </div>
</div>

<script>
    let lines = [
        { text: "Welcome to the Server!", color: "#ffff00", bold: true, italic: false },
        { text: "DONT MESS ANYTHING UP", color: "#aa00aa", bold: true, italic: false },
        { text: "i will personaly touch u if u do hehe - chad", color: "#ff5555", bold: false, italic: false }
    ];

    function addLine() {
        lines.push({ text: "New Line", color: "#ffffff", bold: false, italic: false });
        render();
    }

    function deleteLine(index) {
        lines.splice(index, 1);
        render();
    }

    function updateLine(index, key, value) {
        lines[index][key] = value;
        render();
    }

    function render() {
        const list = document.getElementById('linesList');
        const preview = document.getElementById('previewArea');
        const cmdArea = document.getElementById('commandArea');
        const holoName = document.getElementById('holoName').value || "Hologram";

        list.innerHTML = '';
        preview.innerHTML = '';
        cmdArea.innerHTML = '';

        lines.forEach((line, index) => {
            // Render Input Controls
            const row = document.createElement('div');
            row.className = 'line-row';
            row.innerHTML = `
                <input type="color" value="${line.color}" onchange="updateLine(${index}, 'color', this.value)">
                <input type="text" class="input-field line-text" value="${line.text}" oninput="updateLine(${index}, 'text', this.value)">
                <button class="format-btn ${line.bold ? 'active' : ''}" onclick="updateLine(${index}, 'bold', ${!line.bold})"><b>B</b></button>
                <button class="format-btn ${line.italic ? 'active' : ''}" onclick="updateLine(${index}, 'italic', ${!line.italic})"><i>I</i></button>
                <button class="btn-main btn-delete" onclick="deleteLine(${index})">✕</button>
            `;
            list.appendChild(row);

            // Logic for formatting codes
            let formatCode = `&#${line.color.substring(1)}`;
            if (line.bold) formatCode += "&l";
            if (line.italic) formatCode += "&o";

            // Render Preview
            const pLine = document.createElement('div');
            pLine.className = 'preview-line';
            pLine.style.color = line.color;
            pLine.style.fontWeight = line.bold ? 'bold' : 'normal';
            pLine.style.fontStyle = line.italic ? 'italic' : 'normal';
            pLine.innerText = line.text;
            preview.appendChild(pLine);

            // Render Commands
            const cmd = index === 0 
                ? `/dh h create ${holoName} ${formatCode}${line.text}`
                : `/dh l add ${holoName} ${formatCode}${line.text}`;
            
            const cmdRow = document.createElement('div');
            cmdRow.className = 'command-item';
            cmdRow.innerHTML = `
                <span>${cmd}</span>
                <button class="copy-small" onclick="copyText('${cmd}')">Copy</button>
            `;
            cmdArea.appendChild(cmdRow);
        });
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        alert("Command copied to clipboard!");
    }

    // Initial Render
    render();

    // Re-render when name changes
    document.getElementById('holoName').addEventListener('input', render);
</script>

</body>
</html>
