<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH Single-Command Generator</title>
    <style>
        :root {
            --mc-bg: #1e1e1e;
            --mc-panel: #313233;
            --mc-button: #5a5a5a;
            --mc-accent: #55ff55;
            --mc-text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: var(--mc-text);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 800px;
            background: var(--mc-panel);
            border: 3px solid #000;
            padding: 20px;
            border-radius: 8px;
        }
        h1 { text-align: center; color: var(--mc-accent); text-shadow: 2px 2px #000; margin-top: 0; }
        
        .input-box {
            background: #000;
            border: 2px solid #555;
            padding: 15px;
            margin-bottom: 20px;
        }
        .line-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="color"] {
            background: #222;
            border: 1px solid #555;
            color: white;
            padding: 8px;
        }
        .line-input { flex-grow: 1; font-family: monospace; }
        
        .btn {
            background: var(--mc-button);
            color: white;
            border: 2px solid #000;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn:hover { background: #777; }
        .btn-add { background: #3f51b5; width: 100%; margin-bottom: 10px; }
        .btn-copy { background: var(--mc-accent); color: black; width: 100%; font-size: 1.2rem; }
        
        .preview-pane {
            background: #000;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            border: 2px solid #555;
            padding: 20px;
            min-height: 100px;
            text-align: center;
            margin: 20px 0;
        }
        .preview-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            text-shadow: 2px 2px 2px #000;
            display: block;
            margin-bottom: 5px;
        }
        .command-output {
            background: #000;
            color: #aaa;
            padding: 15px;
            border: 1px dashed var(--mc-accent);
            word-break: break-all;
            font-family: monospace;
            margin-top: 10px;
        }
        .help { font-size: 0.8rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>DH Hologram Maker</h1>
    
    <label>Hologram Name:</label><br>
    <input type="text" id="holoName" value="MyHologram" style="width: 200px; margin-bottom: 15px;">
    
    <div class="input-box" id="lineList">
        <!-- Lines Generated Here -->
    </div>
    
    <button class="btn btn-add" onclick="addLine()">+ Add New Line</button>

    <h3>In-Game Preview:</h3>
    <div class="preview-pane" id="preview"></div>

    <h3>Your Copy-Paste Command:</h3>
    <div class="command-output" id="finalCommand"></div>
    <button class="btn btn-copy" onclick="copyCommand()">Click to Copy Command</button>
    <p class="help">Paste this single command into Minecraft chat to create the multi-line hologram.</p>
</div>

<script>
    let lines = [
        { text: "Welcome to the Server!", color: "#55ff55" },
        { text: "ima eat u twin hehe", color: "#ff5555" },
        { text: "- chad", color: "#5555ff" }
    ];

    function addLine() {
        lines.push({ text: "New line text...", color: "#ffffff" });
        render();
    }

    function removeLine(index) {
        lines.splice(index, 1);
        render();
    }

    function updateLine(index, value) {
        lines[index].text = value;
        updatePreview();
    }

    function updateColor(index, value) {
        lines[index].color = value;
        updatePreview();
    }

    function render() {
        const container = document.getElementById('lineList');
        container.innerHTML = '';
        lines.forEach((line, i) => {
            const div = document.createElement('div');
            div.className = 'line-item';
            div.innerHTML = `
                <input type="color" value="${line.color}" oninput="updateColor(${i}, this.value)">
                <input type="text" class="line-input" value="${line.text}" oninput="updateLine(${i}, this.value)">
                <button class="btn" style="background:#aa0000" onclick="removeLine(${i})">X</button>
            `;
            container.appendChild(div);
        });
        updatePreview();
    }

    function updatePreview() {
        const preview = document.getElementById('preview');
        const output = document.getElementById('finalCommand');
        const name = document.getElementById('holoName').value.replace(/\s/g, '');
        
        preview.innerHTML = '';
        let cmdParts = [];

        lines.forEach(line => {
            // Preview
            const span = document.createElement('span');
            span.className = 'preview-text';
            span.style.color = line.color;
            span.innerText = line.text;
            preview.appendChild(span);

            // Command Construction: DecentHolograms uses &#hex format
            let hex = line.color.toUpperCase();
            cmdParts.push(`&#${hex.substring(1)}${line.text}`);
        });

        // The KEY FIX: Using {#} as the line separator for a single command
        const finalCmd = `/dh h create ${name} ${cmdParts.join('{#}')}`;
        output.innerText = finalCmd;
    }

    function copyCommand() {
        const text = document.getElementById('finalCommand').innerText;
        navigator.clipboard.writeText(text);
        alert("Command Copied! Paste it once into Minecraft.");
    }

    // Initial load
    render();
    document.getElementById('holoName').oninput = updatePreview;
</script>

</body>
</html>
